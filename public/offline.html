<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음벗 - 오프라인</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fefce8 0%, #fffbeb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 8px 30px rgba(245, 158, 11, 0.3);
    }
    
    .icon svg {
      width: 60px;
      height: 60px;
      color: white;
    }
    
    h1 {
      font-size: 28px;
      color: #1c1917;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    p {
      font-size: 20px;
      color: #57534e;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .reassurance {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      margin-bottom: 30px;
    }
    
    .reassurance p {
      font-size: 18px;
      color: #16a34a;
      margin-bottom: 0;
    }
    
    .reassurance .icon-small {
      display: inline-block;
      margin-right: 8px;
    }
    
    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 20px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #15803d;
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3" />
      </svg>
    </div>
    
    <h1>인터넷 연결이 끊겼어요</h1>
    
    <p>비서가 잠시 연결을 확인 중이에요.</p>
    
    <div class="reassurance">
      <p>
        <span class="icon-small">✅</span>
        약 드실 시간은 기기가 기억하고 있으니<br>
        걱정 마세요!
      </p>
    </div>
    
    <button onclick="location.reload()">
      다시 연결하기
    </button>
  </div>
  
  <script>
    // 온라인 상태가 되면 자동 새로고침
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
